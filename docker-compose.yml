version: '3.9'
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: agileapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://app:secret@db:5432/agileapp?schema=public
      PORT: 3001
      NODE_ENV: development
      JWT_SECRET: your_jwt_secret_here
      GOOGLE_CLIENT_ID: google_id
      GOOGLE_CLIENT_SECRET: google_secret
      APPLE_CLIENT_ID: apple_id
      APPLE_TEAM_ID: apple_team
      APPLE_KEY_ID: apple_key
      APPLE_PRIVATE_KEY: apple_private_key
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: agileapp-attachments
      S3_REGION: us-east-1
      S3_USE_PATH_STYLE: "true"
    ports:
      - "3001:3001"
    depends_on:
      - db
      - minio
    volumes:
      - ./backend:/app:delegated
      - /app/node_modules

  web:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c " until (/usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin) do echo '...waiting...' && sleep 1; done; /usr/bin/mc mb myminio/agileapp-attachments; /usr/bin/mc anonymous set public myminio/agileapp-attachments; exit 0; "

volumes:
  pgdata:
  minio_data:
